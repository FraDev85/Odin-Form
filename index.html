<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="container-left">
        <div class="logo">
          <img src="./img/odin-lined.png" alt="logo_odin" />
        </div>
        <div class="back"><h1>Odin</h1></div>
        <p>Photo by <em>Anca Gabriela Zosin</em></p>
      </div>
      <div class="container-right">
        <h4>
          this is not a real online server! You Know you need something like
          this in your life to help realize your deepest dreams. Sign up now for
          get started.
        </h4>
        <h3>You <em>Know</em> you want to</h3>
        <div class="area-form">
          <form action="#" method="post">
            <div class="user_name">
              <label for="user_name">Name: </label>
              <input
                type="text"
                placeholder="Your name..."
                name="user_name"
                id="user_name"
              />
            </div>
            <div class="last-name">
              <label for="last-name">LastName:</label>
              <input
                type="text"
                name="last-name"
                id="last-name"
                placeholder="Your Surname..."
              />
            </div>
            <div class="email">
              <label for="email">Email: </label>
              <input type="email" name="email" id="email" />
            </div>
            <div class="password">
              <label for="password">Password: </label>
              <input type="password" name="password" id="password" />
            </div>
            <div class="repeat-password">
              <label for="reapet-password">Repeat-Password: </label>
              <input
                type="password"
                name="repeat-password"
                id="repeat-password"
              />
            </div>
            <button type="submit">Create Account</button>
          </form>
          <p>already have account? <a href="#">Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
